<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Operativo Hortensia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
overflow:hidden;
font-family:'Press Start 2P', cursive;
transition:1.5s;
width:100vw;
height:100vh;
}

body::after{
content:"";
position:fixed;
inset:0;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03),
rgba(255,255,255,0.03) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
z-index:999;
}

.screen{
width:100vw;
height:100vh;
position:fixed;
top:0;
left:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
text-align:center;
overflow:hidden;
}

.hidden{
display:none;
}

.typing{
white-space:pre-line;
line-height:2;
max-width:900px;
text-shadow:0 0 5px white,0 0 15px white;
z-index:2;
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

button{
padding:15px 30px;
border:3px solid white;
background:black;
color:white;
font-family:'Press Start 2P', cursive;
cursor:pointer;
margin-top:20px;
transition:0.2s;
box-shadow:0 0 10px white;
z-index:2;
}

button:hover{
background:white;
color:black;
}

input{
padding:15px;
border:3px solid white;
background:black;
color:white;
font-family:'Press Start 2P', cursive;
width:320px;
text-align:center;
margin-top:20px;
outline:none;
box-shadow:0 0 10px white;
z-index:2;
}

.progress-container{
width:100%;
max-width:500px;
height:25px;
border:3px solid white;
margin-top:20px;
overflow:hidden;
z-index:2;
}

.progress-bar{
height:100%;
width:0%;
background:white;
transition:0.3s;
}

.content{
background:rgba(0,0,0,0.35);
border:3px solid rgba(255,255,255,0.4);
backdrop-filter:blur(10px);
padding:35px;
border-radius:25px;
width:95%;
max-width:950px;
position:relative;
z-index:2;
box-shadow:0 0 40px rgba(255,255,255,0.25);
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.25);
z-index:1;
}

.emotional{
background-image:url('https://media1.tenor.com/m/F5sQ-3KwDIMAAAAC/powerpuff-girls-aesthetic-hearts.gif');
background-size:cover;
background-position:center center;
background-repeat:no-repeat;
width:100vw;
height:100vh;
overflow:hidden;
}

.girl-gif{
width:240px;
max-width:80vw;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 0 30px rgba(255,255,255,0.5);
position:relative;
z-index:2;
object-fit:cover;
}

.big{
white-space:pre-line;
line-height:2;
font-size:1rem;
font-family:'Quicksand', sans-serif;
position:relative;
z-index:2;
}

.cute-title{
font-family:'Quicksand', sans-serif;
font-size:2.5rem;
margin-bottom:40px;
text-shadow:0 0 15px rgba(255,255,255,0.8);
position:relative;
z-index:2;
}

.cute-menu{
display:flex;
flex-direction:column;
gap:25px;
margin-top:30px;
position:relative;
z-index:2;
}

.cute-item{
font-size:1.4rem;
font-family:'Quicksand', sans-serif;
cursor:pointer;
transition:0.3s;
text-shadow:0 0 10px white;
}

.cute-item:hover{
transform:scale(1.05);
}

.heart{
position:absolute;
color:#ff69b4;
animation:float 10s linear infinite;
opacity:0.5;
pointer-events:none;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-120vh);
}
}

.popup{
position:absolute;
width:300px;
background:black;
border:3px solid white;
padding:30px;
box-shadow:0 0 20px white;
left:50%;
top:50%;
transform:translate(-50%, -50%);
z-index:10;
}

.popup-text{
line-height:2;
margin-bottom:20px;
}

.error{
font-size:0.7rem;
margin-top:10px;
z-index:2;
}

.input-box{
margin-top:40px;
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
z-index:2;
}

#analysisLoadingText{
white-space:pre-line;
overflow-y:auto;
line-height:2;
padding-right:10px;
height:400px;
font-size:0.9rem;
}

@media(max-width:768px){

.typing{
font-size:0.7rem;
}

.big{
font-size:0.8rem;
}

.cute-title{
font-size:1.7rem;
}

.cute-item{
font-size:1.1rem;
}

input{
width:90%;
font-size:0.7rem;
}

.content{
padding:25px;
}

.girl-gif{
width:190px;
}

}

</style>
</head>

<body>

<section class="screen emotional" id="menuScreen">

<div class="overlay"></div>

<div class="content">

<h1 class="cute-title">
Espacio de novio
</h1>

<div class="cute-menu">

<div class="cute-item">
Analisis de sentimientos
</div>

<div class="cute-item">
Mensaje para hoy
</div>

</div>

</div>

</section>

<script>

const fondo = "https://media1.tenor.com/m/F5sQ-3KwDIMAAAAC/powerpuff-girls-aesthetic-hearts.gif";

document.body.style.backgroundImage = `url('${fondo}')`;

document.body.style.backgroundSize = "cover";

document.body.style.backgroundPosition = "center center";

document.body.style.backgroundRepeat = "no-repeat";

function createHearts(){

for(let i=0;i<35;i++){

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML = "❤";

heart.style.left = Math.random()*100 + "vw";

heart.style.fontSize = (10 + Math.random()*25) + "px";

heart.style.animationDuration = (5 + Math.random()*10) + "s";

document.body.appendChild(heart);

}

}

createHearts();

</script>

</body>
</html>
