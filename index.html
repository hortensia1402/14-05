<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Operativo Hortensia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
overflow:hidden;
font-family:'Press Start 2P', cursive;
}

.screen{
width:100%;
height:100vh;
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:30px;
text-align:center;
}

.hidden{
display:none;
}

.typing{
white-space:pre-line;
line-height:2;
max-width:900px;
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

button{
padding:15px 30px;
border:3px solid white;
background:black;
color:white;
font-family:'Press Start 2P', cursive;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:white;
color:black;
}

input{
padding:15px;
border:3px solid white;
background:black;
color:white;
font-family:'Press Start 2P', cursive;
width:320px;
text-align:center;
margin-top:20px;
}

.progress-container{
width:100%;
height:25px;
border:3px solid white;
margin-top:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:white;
transition:0.3s;
}

.content{
background:rgba(255,192,203,0.15);
border:3px solid rgba(255,255,255,0.3);
backdrop-filter:blur(8px);
padding:35px;
border-radius:25px;
width:95%;
max-width:950px;
position:relative;
z-index:2;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.3);
}

.emotional{
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.girl-gif{
width:240px;
border-radius:20px;
margin-bottom:25px;
}

.big{
white-space:pre-line;
line-height:2;
font-size:1rem;
font-family:'Quicksand', sans-serif;
}

.cute-menu{
display:flex;
flex-direction:column;
gap:25px;
margin-top:30px;
}

.cute-item{
font-size:1.4rem;
font-family:'Quicksand', sans-serif;
cursor:pointer;
transition:0.3s;
}

.cute-item:hover{
transform:scale(1.05);
}

.heart{
position:absolute;
color:#ff69b4;
animation:float 10s linear infinite;
opacity:0.5;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-120vh);
}
}

#analysisLoadingScreen .content{
height:80vh;
display:flex;
flex-direction:column;
justify-content:space-between;
overflow:hidden;
}

#analysisLoadingText{
white-space:pre-line;
overflow-y:auto;
line-height:2;
padding-right:10px;
height:100%;
font-size:0.9rem;
}

#analysisLoadingText::-webkit-scrollbar{
width:8px;
}

#analysisLoadingText::-webkit-scrollbar-thumb{
background:white;
border-radius:10px;
}

</style>
</head>

<body>

<section class="screen emotional" id="menuScreen">

<div class="overlay"></div>

<div class="content">

<h1 style="margin-bottom:30px;">
Espacio de novio
</h1>

<div class="cute-menu">

<div class="cute-item" onclick="openAnalysis()">
Analisis de sentimientos
</div>

<div class="cute-item" onclick="openMessage()">
Mensaje para hoy
</div>

</div>

</div>

</section>

<section class="screen emotional hidden" id="analysisLoadingScreen">

<div class="overlay"></div>

<div class="content">

<div class="big" id="analysisLoadingText"></div>

<div class="progress-container">
<div class="progress-bar" id="analysisBar"></div>
</div>

</div>

</section>

<section class="screen emotional hidden" id="analysisResultScreen">

<div class="overlay"></div>

<div class="content">

<img
src="https://c.tenor.com/YX0_j3GveucAAAAd/tenor.gif"
class="girl-gif">

<div class="big" id="analysisResultText"></div>

<button onclick="backMenu()">
VOLVER
</button>

</div>

</section>

<section class="screen emotional hidden" id="messageDateScreen">

<div class="overlay"></div>

<div class="content">

<div class="big">
Ingrese fecha:
</div>

<input
type="text"
id="dateInput"
placeholder="14/05/2026">

<br>

<button onclick="checkDate()">
ABRIR
</button>

</div>

</section>

<section class="screen emotional hidden" id="messageResultScreen">

<div class="overlay"></div>

<div class="content">

<img
id="messageGif"
src=""
class="girl-gif">

<div class="big" id="messageText"></div>

<button onclick="backMenu()">
VOLVER
</button>

</div>

</section>

<script>

/* FONDO */

const fondo =
"https://media1.tenor.com/m/F5sQ-3KwDIMAAAAC/powerpuff-girls-aesthetic-hearts.gif";

document.body.style.backgroundImage =
`url('${fondo}')`;

document.body.style.backgroundSize =
"cover";

document.body.style.backgroundPosition =
"center";

document.querySelectorAll(".emotional")
.forEach(screen=>{

screen.style.backgroundImage =
`url('${fondo}')`;

});

/* CORAZONES */

for(let i=0;i<35;i++){

const heart =
document.createElement("div");

heart.classList.add("heart");

heart.innerHTML = "❤";

heart.style.left =
Math.random()*100 + "vw";

heart.style.fontSize =
(10 + Math.random()*25) + "px";

heart.style.animationDuration =
(5 + Math.random()*10) + "s";

document.body.appendChild(heart);

}

/* TYPEWRITER */

function typeWriter(id,text,speed=20){

const element =
document.getElementById(id);

element.innerHTML = "";

let i = 0;

function typing(){

if(i < text.length){

element.innerHTML =
text.substring(0,i+1) +
'<span class="cursor">█</span>';

i++;

element.scrollTop =
element.scrollHeight;

setTimeout(typing,speed);

}else{

element.innerHTML = text;

}

}

typing();

}

/* CAMBIAR PANTALLA */

function changeScreen(hide,show){

document
.getElementById(hide)
.classList.add("hidden");

document
.getElementById(show)
.classList.remove("hidden");

}

/* ANALISIS */

const analysisSteps = [

`[0%] Iniciando análisis emocional...`,

`[2%] Cargando recuerdos importantes...

✔ Primeras conversaciones encontradas
✔ Cosas que le gustan a Alex encontradas
✔ Datos randoms sobre Alex encontrados`,

`[6%] Escaneando interacciones diarias...

✔ Mensajes
✔ Juegos
✔ Llamadas...`,

`[11%] Analizando llamadas nocturnas...

✔ Compartir que hicieron en sus día
✔ Decirse cuanto se aman`,

`[15%] Detectando efectos de su voz...

✔ Tranquilidad inmediata encontrada
✔ Disminucion de niveles de ansiedad al escucharlo`,

`[21%] Escaneando emociones actuales...

✔ La usuaria se siente amada
✔ La usuaria se siente respetada
✔ La usuaria se siente comprendida
✔ La usuaria se siente escuchada`,

`[29%] Revisando actividad emocional reciente...

✔ Sonrisas involuntarias registradas después de cada llamada

> Tiempo compartido genera felicidad`,

`[34%] Detectando muestras de cariño...

✔ Besos enviados correctamente recibidos
✔ Palabras y frases de amor correctamente atesoradas
✔ Reacción emocional positiva extremadamente alta`,

`[40%] Escaneando galería emocional...

✔ Fotos de su carita encontradas
✔ Videos de Besos encontrados

> El sistema detectó ternura excesiva`,

`[48%] Analizando percepción del sujeto...

Resultado encontrado:

“hermoso”
“wonito”
“tierno”
“Bondadoso”
“amoroso”
“Compañero”
“Inteligente”
“Empatico”
“Admirable”
“Cariñoso”
“Único”
“Especial”
“Perfecto”
“Inigualable”`,

`[56%] Escaneando recuerdos antes de dormir...

✔ Canciones para mimir detectadas

> La usuaria se duerme sonriendo frecuentemente`,

`[64%] Analizando dependencia afectiva...

✔ Necesidad frecuente de escuchar su voz encontrada
✔ Pensamientos constantes detectados`,

`[72%] Nivel de enamoramiento ...

> En aumento constante`,

`[81%] Detectando amenazas...

⚠ Distancia física presente

Estado:
No afecta la conexión emocional`,

`[89%] Ejecutando revisión final...

✔ Relación estable emocionalmente
✔ Niveles altos de cariño y confianza`,

`[96%] Preparando resultado...`,

`[100%] ANÁLISIS COMPLETADO`

];

function openAnalysis(){

changeScreen(
"menuScreen",
"analysisLoadingScreen"
);

const text =
document.getElementById(
"analysisLoadingText"
);

const bar =
document.getElementById(
"analysisBar"
);

let current = 0;

function nextStep(){

if(current >= analysisSteps.length){

setTimeout(()=>{

changeScreen(
"analysisLoadingScreen",
"analysisResultScreen"
);

typeWriter(
"analysisResultText",

`RESULTADO FINAL:

Después de analizar emociones, llamadas, recuerdos y pensamientos constantes, el sistema concluye que esta persona se convirtió en uno de los lugares más seguros, felices y importantes para la usuaria.

No se encontraron errores.
Solo amor.`,

20
);

},1000);

return;

}

const content =
analysisSteps[current];

text.innerHTML = "";

let i = 0;

function write(){

if(i < content.length){

text.innerHTML =
content.substring(0,i+1) +
'<span class="cursor">█</span>';

i++;

text.scrollTop =
text.scrollHeight;

setTimeout(write,15);

}else{

const percent =
parseInt(
content.match(/\[(\d+)%\]/)?.[1] || 0
);

bar.style.width =
percent + "%";

current++;

setTimeout(
nextStep,
5000
);

}

}

write();

}

nextStep();

}

/* MENSAJE */

function openMessage(){

changeScreen(
"menuScreen",
"messageDateScreen"
);

}

function checkDate(){

const value =
document
.getElementById("dateInput")
.value
.trim();

const randomMessages = [

"Hola Alexinlin de mi amor, tomaste awita?",

"Te amo mucho, me amas?",

"Me tañias? Yo te tanio?"

];

let finalText = "";
let finalGif = "";

if(value === "14/05/2026"){

finalText =
`Felices 3 meses mi amor!
Gracias por ser mi novio♡`;

finalGif =
"https://64.media.tumblr.com/be0cf900f283ad29b2d0a1f44c52a821/6a9c8986f837ff55-05/s400x600/c0a31febc663585b8baef79e7250c0d130350373.gif";

}else{

finalText =
randomMessages[
Math.floor(
Math.random()*randomMessages.length
)
];

finalGif =
"https://media.tenor.com/owSXAc8yVpAAAAAj/milk-and-mocha-kiss-cheek.gif";

}

document.getElementById(
"messageGif"
).src = finalGif;

changeScreen(
"messageDateScreen",
"messageResultScreen"
);

typeWriter(
"messageText",
finalText,
40
);

}

/* VOLVER */

function backMenu(){

const screens = [

"analysisLoadingScreen",
isResultScreen",
"messageDateScreen",
"messageResultScreen"

];

screens.forEach(id=>{

document
.getElementById(id)
.classList.add("hidden");

});

document
.getElementById("menuScreen")
.classList.remove("hidden");

}

</script>

</body>
</html>
