<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Operativo Hortensia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:black;
    color:white;

    font-family:'Press Start 2P', cursive;

    overflow:hidden;

    transition:1.5s;
}

/* CRT */

body::after{

    content:"";

    position:fixed;

    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );

    pointer-events:none;
}

/* PANTALLAS */

.screen{

    width:100%;
    height:100vh;

    display:flex;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    text-align:center;

    padding:30px;

    position:relative;
}

.hidden{
    display:none;
}

/* TEXTO */

.typing{

    font-size:1rem;

    line-height:2.4;

    max-width:900px;

    text-align:center;

    text-shadow:
    0 0 5px white,
    0 0 15px white;
}

/* CURSOR */

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{

    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}

}

/* INPUT */

.input-box{

    margin-top:40px;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:25px;
}

input{

    background:black;

    color:white;

    border:3px solid white;

    padding:15px;

    width:320px;

    text-align:center;

    font-family:'Press Start 2P', cursive;

    outline:none;

    box-shadow:
    0 0 10px white;
}

/* BOTON */

button{

    background:black;

    color:white;

    border:3px solid white;

    padding:18px 30px;

    cursor:pointer;

    font-family:'Press Start 2P', cursive;

    transition:0.2s;

    box-shadow:
    0 0 10px white;
}

button:hover{

    background:white;

    color:black;
}

/* ERROR */

.error{

    font-size:0.7rem;

    margin-top:10px;
}

/* BARRA */

.progress-container{

    width:400px;

    height:30px;

    border:3px solid white;

    margin-top:40px;

    overflow:hidden;
}

.progress-bar{

    width:0%;

    height:100%;

    background:white;
}

/* POPUPS */

.popup{

    position:absolute;

    width:300px;

    background:black;

    border:3px solid white;

    padding:30px;

    box-shadow:
    0 0 20px white;
}

.popup-text{

    line-height:2;

    margin-bottom:20px;
}

/* INTERFAZ EMOCIONAL */

.emotional{

    background-image:url('fondo.jpg');

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;
}

.overlay{

    position:absolute;

    inset:0;

    background:
    rgba(0,0,0,0.25);

    backdrop-filter:blur(3px);
}

.content{

    position:relative;

    z-index:2;
}

/* CORAZONES */

.heart{

    position:absolute;

    color:white;

    opacity:0.3;

    animation:float 10s linear infinite;
}

@keyframes float{

    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-120vh);
    }

}

/* GIF */

.girl-gif{

    width:250px;

    margin-bottom:30px;

    border-radius:20px;

    box-shadow:
    0 0 30px rgba(255,255,255,0.5);
}

/* TEXTO NUEVO */

.cute-text{

    font-family:'Quicksand', sans-serif;

    font-size:2rem;

    color:white;

    text-shadow:
    0 0 10px rgba(255,255,255,0.8);
}

.cute-title{

    font-family:'Quicksand', sans-serif;

    font-size:2.5rem;

    color:white;

    margin-bottom:50px;

    text-shadow:
    0 0 15px rgba(255,255,255,0.8);
}

.cute-menu{

    display:flex;

    flex-direction:column;

    gap:30px;
}

.cute-item{

    font-family:'Quicksand', sans-serif;

    font-size:1.5rem;

    color:white;

    cursor:pointer;

    transition:0.3s;
}

.cute-item:hover{

    transform:scale(1.05);
}

.big{

    font-size:1rem;

    line-height:2.5;

    color:white;

    font-family:'Quicksand', sans-serif;
}

@media(max-width:768px){

    .typing{
        font-size:0.7rem;
    }

    .cute-title{
        font-size:1.7rem;
    }

    .cute-item{
        font-size:1.2rem;
    }

    .cute-text{
        font-size:1.4rem;
    }

    .big{
        font-size:0.8rem;
    }

    input{
        width:90%;
        font-size:0.7rem;
    }

    .progress-container{
        width:90%;
    }

}

</style>

</head>

<body>

<!-- PAGINA 1 -->

<section class="screen" id="screen1">

    <div class="typing" id="introText"></div>

</section>

<!-- IDENTIFICAR -->

<section class="screen hidden" id="screen2">

    <div class="typing" id="identifyText"></div>

    <div class="input-box">

        <input
        type="text"
        id="nameInput"
        placeholder="NOMBRE">

        <button onclick="checkName()">
            CONTINUAR
        </button>

        <div class="error" id="nameError"></div>

    </div>

</section>

<!-- CONTINUAR -->

<section class="screen hidden" id="screen3">

    <div class="typing" id="confirmText"></div>

    <button onclick="goQuestion1()">
        CONTINUAR
    </button>

</section>

<!-- PREGUNTA 1 -->

<section class="screen hidden" id="screen4">

    <div class="typing" id="question1"></div>

    <div class="input-box">

        <input
        type="text"
        id="answer1"
        placeholder="RESPUESTA">

        <button onclick="checkAnswer1()">
            CONFIRMAR
        </button>

        <div class="error" id="error1"></div>

    </div>

</section>

<!-- PREGUNTA 2 -->

<section class="screen hidden" id="screen5">

    <div class="typing" id="question2"></div>

    <div class="input-box">

        <input
        type="text"
        id="answer2"
        placeholder="RESPUESTA">

        <button onclick="checkAnswer2()">
            CONFIRMAR
        </button>

        <div class="error" id="error2"></div>

    </div>

</section>

<!-- INGRESANDO -->

<section class="screen hidden" id="enteringScreen">

    <div class="typing" id="enteringText"></div>

</section>

<!-- BIENVENIDO -->

<section class="screen hidden" id="welcomeScreen">

    <div class="typing" id="welcomeText"></div>

</section>

<!-- CARGANDO MENU -->

<section class="screen hidden" id="loadingMenuScreen">

    <div class="typing" id="loadingMenuText"></div>

    <div class="progress-container">

        <div class="progress-bar" id="progressBar"></div>

    </div>

</section>

<!-- ERRORES -->

<section class="screen hidden" id="errorScreen"></section>

<!-- CRISIS -->

<section class="screen hidden" id="crisisScreen">

    <div class="typing" id="crisisText"></div>

    <button onclick="updateSystem()">
        ACTUALIZAR
    </button>

</section>

<!-- CHICA -->

<section class="screen emotional hidden" id="girlScreen">

    <div class="overlay"></div>

    <div class="content">

        <img
        src="girl.gif"
        class="girl-gif">

        <div class="cute-text" id="girlText"></div>

    </div>

</section>

<!-- MENU -->

<section class="screen emotional hidden" id="menuScreen">

    <div class="overlay"></div>

    <div class="content">

        <div class="cute-title" id="menuTitle"></div>

        <div class="cute-menu">

            <div class="cute-item"
            onclick="openAnalysis()">

                Analisis de sentimientos

            </div>

            <div class="cute-item"
            onclick="openStatus()">

                Estado

            </div>

            <div class="cute-item"
            onclick="openMessage()">

                Mensaje

            </div>

        </div>

    </div>

</section>

<!-- ANALISIS -->

<section class="screen emotional hidden"
id="analysisScreen">

    <div class="overlay"></div>

    <div class="content">

        <div class="big" id="analysisText"></div>

        <button onclick="backMenu()">
            VOLVER
        </button>

    </div>

</section>

<!-- ESTADO -->

<section class="screen emotional hidden"
id="statusScreen">

    <div class="overlay"></div>

    <div class="content">

        <div class="big" id="statusText"></div>

        <button onclick="backMenu()">
            VOLVER
        </button>

    </div>

</section>

<!-- MENSAJE -->

<section class="screen emotional hidden"
id="messageScreen">

    <div class="overlay"></div>

    <div class="content">

        <div class="big" id="messageText"></div>

        <button onclick="backMenu()">
            VOLVER
        </button>

    </div>

</section>

<script>

function typeWriter(id, text, speed=40){

    const element =
    document.getElementById(id);

    element.innerHTML = "";

    let i = 0;

    function typing(){

        if(i < text.length){

            element.innerHTML =
            text.substring(0, i+1) +
            '<span class="cursor">█</span>';

            i++;

            setTimeout(typing, speed);

        }else{

            element.innerHTML =
            text +
            '<span class="cursor">█</span>';

        }

    }

    typing();

}

/* INTRO */

typeWriter(
    "introText",
`hola

bienvenido al sistema operativo de Hortensia`,
70
);

setTimeout(()=>{

    changeScreen("screen1","screen2");

    typeWriter(
        "identifyText",
        "por favor identificate.",
        50
    );

},7000);

/* VALIDAR NOMBRE */

let userName = "";

function checkName(){

    const validNames = [
        "alex",
        "alexin",
        "antorchita",
        "anto"
    ];

    const input =
    document
    .getElementById("nameInput")
    .value
    .toLowerCase()
    .trim();

    if(validNames.includes(input)){

        userName = input;

        changeScreen("screen2","screen3");

        typeWriter(
            "confirmText",
`continuar

para confirmar que eres ${userName}
responde las siguientes preguntas.`,
45
        );

    }else{

        document
        .getElementById("nameError")
        .innerHTML =
        "ERROR: usuario no identificado";

    }

}

/* PREGUNTAS */

function goQuestion1(){

    changeScreen("screen3","screen4");

    typeWriter(
        "question1",
        "¿Que cosa en forma de osito adoptante como mascota?",
        40
    );

}

function checkAnswer1(){

    const answer =
    document
    .getElementById("answer1")
    .value
    .toLowerCase()
    .trim();

    if(answer === "papa"){

        changeScreen("screen4","screen5");

        typeWriter(
            "question2",
            "¿Como se llama tu mascota?",
            40
        );

    }else{

        document
        .getElementById("error1")
        .innerHTML =
        "ERROR: RESPUESTA INCORRECTA";

    }

}

function checkAnswer2(){

    const answer =
    document
    .getElementById("answer2")
    .value
    .toLowerCase()
    .trim();

    if(answer === "kimmy"){

        enteringSequence();

    }else{

        document
        .getElementById("error2")
        .innerHTML =
        "ERROR: RESPUESTA INCORRECTA";

    }

}

/* INGRESANDO */

function enteringSequence(){

    changeScreen("screen5","enteringScreen");

    typeWriter(
        "enteringText",
        "Ingresando...",
        60
    );

    setTimeout(()=>{

        changeScreen("enteringScreen","welcomeScreen");

        typeWriter(
            "welcomeText",
            `Bienvenido Alex`,
            60
        );

    },3000);

    setTimeout(()=>{

        changeScreen(
            "welcomeScreen",
            "loadingMenuScreen"
        );

        typeWriter(
            "loadingMenuText",
            "cargando menu de novio...",
            50
        );

        startLoading();

    },7000);

}

/* BARRA */

function startLoading(){

    const bar =
    document.getElementById("progressBar");

    let width = 0;

    const interval = setInterval(()=>{

        width += 2;

        bar.style.width = width + "%";

        if(width >= 100){

            clearInterval(interval);

            setTimeout(()=>{
                startErrors();
            },1000);

        }

    },80);

}

/* ERRORES */

let errorCount = 0;

function startErrors(){

    changeScreen(
        "loadingMenuScreen",
        "errorScreen"
    );

    spawnError();

}

function spawnError(){

    const container =
    document.getElementById("errorScreen");

    const popup =
    document.createElement("div");

    popup.classList.add("popup");

    popup.style.left =
    Math.random()*60 + 10 + "%";

    popup.style.top =
    Math.random()*60 + 10 + "%";

    popup.innerHTML = `
    <div class="popup-text">
        ERROR DEL SISTEMA
    </div>

    <button onclick="nextError(this)">
        OK
    </button>
    `;

    container.appendChild(popup);

}

function nextError(button){

    button.parentElement.remove();

    errorCount++;

    if(errorCount < 14){

        spawnError();

    }else{

        setTimeout(()=>{

            changeScreen(
                "errorScreen",
                "crisisScreen"
            );

            typeWriter(
                "crisisText",
`inicio de sesion de Alex detectado

sistema operativo en crisis`,
50
            );

        },500);

    }

}

/* ACTUALIZAR */

function updateSystem(){

    createHearts();

    changeScreen(
        "crisisScreen",
        "girlScreen"
    );

    typeWriter(
        "girlText",
        "hola amor ❤",
        60
    );

    setTimeout(()=>{

        changeScreen(
            "girlScreen",
            "menuScreen"
        );

        typeWriter(
            "menuTitle",
            "espacio de novio",
            60
        );

    },5000);

}

/* CORAZONES */

function createHearts(){

    for(let i=0;i<40;i++){

        const heart =
        document.createElement("div");

        heart.classList.add("heart");

        heart.innerHTML = "❤";

        heart.style.left =
        Math.random()*100 + "vw";

        heart.style.fontSize =
        (10 + Math.random()*20) + "px";

        heart.style.animationDuration =
        (5 + Math.random()*10) + "s";

        document.body.appendChild(heart);

    }

}

/* CAMBIAR PANTALLAS */

function changeScreen(hide,show){

    document
    .getElementById(hide)
    .classList.add("hidden");

    document
    .getElementById(show)
    .classList.remove("hidden");

}

/* MENU */

function hideAll(){

    document
    .getElementById("menuScreen")
    .classList.add("hidden");

    document
    .getElementById("analysisScreen")
    .classList.add("hidden");

    document
    .getElementById("statusScreen")
    .classList.add("hidden");

    document
    .getElementById("messageScreen")
    .classList.add("hidden");

}

/* ANALISIS */

function openAnalysis(){

    hideAll();

    document
    .getElementById("analysisScreen")
    .classList.remove("hidden");

    typeWriter(
        "analysisText",
`como me siento con Alex...

+ aumento de felicidad

+ sensación de calma

+ pensamientos acelerados

+ necesidad de quedarse un rato más

momento favorito del día:
hablar con vos

cuando Alex aparece:

el ruido mental disminuye

el tiempo pasa demasiado rápido

la distancia parece un poco menos injusta`,
35
    );

}

/* ESTADO */

function openStatus(){

    hideAll();

    document
    .getElementById("statusScreen")
    .classList.remove("hidden");

    typeWriter(
        "statusText",
`locamente enamorada de Alex

❤ ❤ ❤ ❤ ❤ ❤ ❤`,
40
    );

}

/* MENSAJE */

function openMessage(){

    hideAll();

    document
    .getElementById("messageScreen")
    .classList.remove("hidden");

    typeWriter(
        "messageText",
`feliz 3 meses

mi amor ❤`,
50
    );

}

/* VOLVER */

function backMenu(){

    hideAll();

    document
    .getElementById("menuScreen")
    .classList.remove("hidden");

}

</script>

</body>

  </html>
