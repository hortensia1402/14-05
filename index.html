<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Operativo Hortensia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:black;
    color:white;

    font-family:'Press Start 2P', cursive;

    overflow:hidden;

    transition:1.5s;
}

/* CRT */

body::after{

    content:"";

    position:fixed;

    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );

    pointer-events:none;
}

/* PANTALLAS */

.screen{

    width:100%;
    height:100vh;

    display:flex;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    text-align:center;

    padding:30px;

    position:relative;
}

.hidden{
    display:none;
}

/* TEXTO */

.typing{

    font-size:1rem;

    line-height:2.4;

    max-width:900px;

    text-align:center;

    text-shadow:
    0 0 5px white,
    0 0 15px white;
}

/* CURSOR */

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{

    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}

}

/* INPUT */

.input-box{

    margin-top:40px;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:25px;
}

input{

    background:black;

    color:white;

    border:3px solid white;

    padding:15px;

    width:320px;

    text-align:center;

    font-family:'Press Start 2P', cursive;

    outline:none;

    box-shadow:
    0 0 10px white;
}

/* BOTON */

button{

    background:black;

    color:white;

    border:3px solid white;

    padding:18px 30px;

    cursor:pointer;

    font-family:'Press Start 2P', cursive;

    transition:0.2s;

    box-shadow:
    0 0 10px white;
}

button:hover{

    background:white;

    color:black;
}

/* ERROR */

.error{

    font-size:0.7rem;

    margin-top:10px;
}

/* BARRA */

.progress-container{

    width:400px;

    height:30px;

    border:3px solid white;

    margin-top:40px;

    overflow:hidden;
}

.progress-bar{

    width:0%;

    height:100%;

    background:white;
}

/* POPUPS */

.popup{

    position:absolute;

    width:300px;

    background:black;

    border:3px solid white;

    padding:30px;

    box-shadow:
    0 0 20px white;

    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
}

.popup-text{

    line-height:2;

    margin-bottom:20px;
}

/* INTERFAZ EMOCIONAL */

.emotional{

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;
}

.overlay{

    position:absolute;

    inset:0;

    background:
    rgba(0,0,0,0.25);

    backdrop-filter:blur(3px);
}

.content{

    position:relative;

    z-index:2;

    background:rgba(255,182,193,0.2);

    border:3px solid rgba(255,255,255,0.5);

    padding:50px;

    border-radius:30px;

    backdrop-filter:blur(10px);

    box-shadow:
    0 0 30px rgba(255,255,255,0.3);
}

/* CORAZONES */

.heart{

    position:absolute;

    color:white;

    opacity:0.3;

    animation:float 10s linear infinite;
}

@keyframes float{

    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-120vh);
    }

}

/* GIF */

.girl-gif{

    width:250px;

    margin-bottom:30px;

    border-radius:20px;

    box-shadow:
    0 0 30px rgba(255,255,255,0.5);
}

/* TEXTO */

.cute-text{

    font-family:'Quicksand', sans-serif;

    font-size:2rem;

    color:white;

    text-shadow:
    0 0 10px rgba(255,255,255,0.8);
}

.cute-title{

    font-family:'Quicksand', sans-serif;

    font-size:2.5rem;

    color:white;

    margin-bottom:50px;

    text-shadow:
    0 0 15px rgba(255,255,255,0.8);
}

.cute-menu{

    display:flex;

    flex-direction:column;

    gap:30px;
}

.cute-item{

    font-family:'Quicksand', sans-serif;

    font-size:1.5rem;

    color:white;

    cursor:pointer;

    transition:0.3s;

    text-shadow:
    0 0 10px white;
}

.cute-item:hover{

    transform:scale(1.05);
}

.big{

    font-size:1rem;

    line-height:2.5;

    color:white;

    font-family:'Quicksand', sans-serif;
}

@media(max-width:768px){

    .typing{
        font-size:0.7rem;
    }

    .cute-title{
        font-size:1.7rem;
    }

    .cute-item{
        font-size:1.2rem;
    }

    .cute-text{
        font-size:1.4rem;
    }

    .big{
        font-size:0.8rem;
    }

    input{
        width:90%;
        font-size:0.7rem;
    }

    .progress-container{
        width:90%;
    }

}

</style>

</head>

<body>

<!-- INTRO -->

<section class="screen" id="screen1">

    <div class="typing" id="introText"></div>

</section>

<!-- IDENTIFICAR -->

<section class="screen hidden" id="screen2">

    <div class="typing" id="identifyText"></div>

    <div class="input-box">

        <input
        type="text"
        id="nameInput"
        placeholder="NOMBRE">

        <button onclick="checkName()">
            CONTINUAR
        </button>

        <div class="error" id="nameError"></div>

    </div>

</section>

<!-- CONFIRMAR -->

<section class="screen hidden" id="screen3">

    <div class="typing" id="confirmText"></div>

    <button onclick="goQuestion1()">
        CONTINUAR
    </button>

</section>

<!-- PREGUNTA 1 -->

<section class="screen hidden" id="screen4">

    <div class="typing" id="question1"></div>

    <div class="input-box">

        <input
        type="text"
        id="answer1"
        placeholder="RESPUESTA">

        <button onclick="checkAnswer1()">
            CONFIRMAR
        </button>

        <div class="error" id="error1"></div>

    </div>

</section>

<!-- PREGUNTA 2 -->

<section class="screen hidden" id="screen5">

    <div class="typing" id="question2"></div>

    <div class="input-box">

        <input
        type="text"
        id="answer2"
        placeholder="RESPUESTA">

        <button onclick="checkAnswer2()">
            CONFIRMAR
        </button>

        <div class="error" id="error2"></div>

    </div>

</section>

<!-- PREGUNTA 3 -->

<section class="screen hidden" id="screen6">

    <div class="typing" id="question3"></div>

    <div class="input-box">

        <input
        type="text"
        id="answer3"
        placeholder="RESPUESTA">

        <button onclick="checkAnswer3()">
            CONFIRMAR
        </button>

        <div class="error" id="error3"></div>

    </div>

</section>

<!-- CARGANDO -->

<section class="screen hidden" id="loadingMenuScreen">

    <div class="typing" id="loadingMenuText"></div>

    <div class="progress-container">

        <div class="progress-bar" id="progressBar"></div>

    </div>

</section>

<!-- ERRORES -->

<section class="screen hidden" id="errorScreen"></section>

<!-- CRISIS -->

<section class="screen hidden" id="crisisScreen">

    <div class="typing" id="crisisText"></div>

    <button onclick="updateSystem()">
        ACTUALIZAR
    </button>

</section>

<!-- ACTUALIZANDO -->

<section class="screen hidden" id="updatingScreen">

    <div class="typing" id="updatingText"></div>

    <div class="progress-container">

        <div class="progress-bar" id="updateBar"></div>

    </div>

</section>

<!-- BIENVENIDA -->

<section class="screen emotional hidden" id="girlScreen">

    <div class="overlay"></div>

    <div class="content">

        <img
        src="https://media.tenor.com/owSXAc8yVpAAAAAj/milk-and-mocha-kiss-cheek.gif"
        class="girl-gif">

        <div class="cute-text" id="girlText"></div>

    </div>

</section>

<!-- MENU -->

<section class="screen emotional hidden" id="menuScreen">

    <div class="overlay"></div>

    <div class="content">

        <div class="cute-title" id="menuTitle"></div>

        <div class="cute-menu">

            <div class="cute-item"
            onclick="openAnalysis()">

                Analisis de sentimientos

            </div>

            <div class="cute-item"
            onclick="openStatus()">

                Estado

            </div>

            <div class="cute-item"
            onclick="openMessage()">

                Mensaje

            </div>

        </div>

    </div>

</section>

<!-- ANALISIS -->

<section class="screen emotional hidden"
id="analysisScreen">

    <div class="overlay"></div>

    <div class="content">

        <img
        src="https://media.tenor.com/owSXAc8yVpAAAAAj/milk-and-mocha-kiss-cheek.gif"
        class="girl-gif">

        <div class="big" id="analysisText"></div>

        <button onclick="backMenu()">
            VOLVER
        </button>

    </div>

</section>

<!-- ESTADO -->

<section class="screen emotional hidden"
id="statusScreen">

    <div class="overlay"></div>

    <div class="content">

        <img
        src="https://64.media.tumblr.com/8a41368b15932bafcaab0b69a3843c5c/cbc89180cadf1e00-b3/s400x600/735c6d80961dd6fc2ab99e6593e7879dc9e8d757.gifv"
        class="girl-gif">

        <div class="big" id="statusText"></div>

        <button onclick="backMenu()">
            VOLVER
        </button>

    </div>

</section>

<!-- MENSAJE -->

<section class="screen emotional hidden"
id="messageScreen">

    <div class="overlay"></div>

    <div class="content">

        <img
        src="https://64.media.tumblr.com/be0cf900f283ad29b2d0a1f44c52a821/6a9c8986f837ff55-05/s400x600/c0a31febc663585b8baef79e7250c0d130350373.gif"
        class="girl-gif">

        <div class="big" id="messageText"></div>

        <button onclick="backMenu()">
            VOLVER
        </button>

    </div>

</section>

<script>

function typeWriter(id, text, speed=40){

    const element =
    document.getElementById(id);

    element.innerHTML = "";

    let i = 0;

    function typing(){

        if(i < text.length){

            element.innerHTML =
            text.substring(0, i+1) +
            '<span class="cursor">█</span>';

            i++;

            setTimeout(typing, speed);

        }else{

            element.innerHTML =
            text +
            '<span class="cursor">█</span>';

        }

    }

    typing();

}

/* INTRO */

typeWriter(
    "introText",
`hola

bienvenido al sistema operativo de Hortensia`,
70
);

setTimeout(()=>{

    changeScreen("screen1","screen2");

    typeWriter(
        "identifyText",
        "por favor identificate.",
        50
    );

},7000);

/* NOMBRE */

let userName = "";

function checkName(){

    const validNames = [
        "alex",
        "alexin",
        "antorchita",
        "anto"
    ];

    const input =
    document
    .getElementById("nameInput")
    .value
    .toLowerCase()
    .trim();

    if(validNames.includes(input)){

        userName = input;

        changeScreen("screen2","screen3");

        typeWriter(
            "confirmText",
`continuar

para confirmar que eres ${userName}
responde las siguientes preguntas.`,
45
        );

    }else{

        document
        .getElementById("nameError")
        .innerHTML =
        "ERROR: usuario no identificado";

    }

}

/* PREGUNTA 1 */

function goQuestion1(){

    changeScreen("screen3","screen4");

    typeWriter(
        "question1",
        "¿Que cosa en forma de osito adoptaste como mascota?",
        40
    );

}

function checkAnswer1(){

    const answer =
    document
    .getElementById("answer1")
    .value
    .toLowerCase()
    .trim();

    if(
        answer === "papa" ||
        answer === "papá" ||
        answer === "una papa" ||
        answer === "una papá"
    ){

        changeScreen("screen4","screen5");

        typeWriter(
            "question2",
            "¿Como se llama tu mascota?",
            40
        );

    }else{

        document
        .getElementById("error1")
        .innerHTML =
        "ERROR: RESPUESTA INCORRECTA";

    }

}

/* PREGUNTA 2 */

function checkAnswer2(){

    const answer =
    document
    .getElementById("answer2")
    .value
    .toLowerCase()
    .trim();

    if(answer === "kimmy"){

        changeScreen("screen5","screen6");

        typeWriter(
            "question3",
            "Quiero llenarte de leche los...",
            40
        );

    }else{

        document
        .getElementById("error2")
        .innerHTML =
        "ERROR: RESPUESTA INCORRECTA";

    }

}

/* PREGUNTA 3 */

function checkAnswer3(){

    const answer =
    document
    .getElementById("answer3")
    .value
    .toLowerCase()
    .trim();

    if(
        answer === "fideos" ||
        answer === "los fideos"
    ){

        enteringSequence();

    }else{

        document
        .getElementById("error3")
        .innerHTML =
        "ERROR: RESPUESTA INCORRECTA";

    }

}

/* ENTRAR */

function enteringSequence(){

    changeScreen(
        "screen6",
        "loadingMenuScreen"
    );

    typeWriter(
        "loadingMenuText",
        "cargando menu de novio...",
        50
    );

    startLoading();

}

/* CARGA */

function startLoading(){

    const bar =
    document.getElementById("progressBar");

    let width = 0;

    const interval = setInterval(()=>{

        width += 2;

        bar.style.width = width + "%";

        if(width >= 100){

            clearInterval(interval);

            setTimeout(()=>{
                startErrors();
            },1000);

        }

    },80);

}

/* ERRORES */

let errorCount = 0;

function startErrors(){

    changeScreen(
        "loadingMenuScreen",
        "errorScreen"
    );

    spawnError();

}

function spawnError(){

    const container =
    document.getElementById("errorScreen");

    const popup =
    document.createElement("div");

    popup.classList.add("popup");

    popup.innerHTML = `
    <div class="popup-text">
        ERROR DEL SISTEMA
    </div>

    <button onclick="nextError(this)">
        OK
    </button>
    `;

    container.appendChild(popup);

}

function nextError(button){

    button.parentElement.remove();

    errorCount++;

    if(errorCount < 7){

        spawnError();

    }else{

        setTimeout(()=>{

            changeScreen(
                "errorScreen",
                "crisisScreen"
            );

            typeWriter(
                "crisisText",
`inicio de sesion de Alex detectado

sistema operativo en crisis

requiere actualización`,
50
            );

        },500);

    }

}

/* ACTUALIZAR */

function updateSystem(){

    changeScreen(
        "crisisScreen",
        "updatingScreen"
    );

    typeWriter(
        "updatingText",
        "actualizando sistema...",
        50
    );

    const bar =
    document.getElementById("updateBar");

    let width = 0;

    const interval = setInterval(()=>{

        width += 2;

        bar.style.width = width + "%";

        if(width >= 100){

            clearInterval(interval);

            const fondo =
            "https://media1.tenor.com/m/F5sQ-3KwDIMAAAAC/powerpuff-girls-aesthetic-hearts.gif";

            document.body.style.backgroundImage =
            `url('${fondo}')`;

            document.body.style.backgroundSize =
            "cover";

            document.body.style.backgroundPosition =
            "center";

            document.body.style.backgroundRepeat =
            "no-repeat";

            document.querySelectorAll(".emotional")
            .forEach(screen=>{

                screen.style.backgroundImage =
                `url('${fondo}')`;

                screen.style.backgroundSize =
                "cover";

                screen.style.backgroundPosition =
                "center";

                screen.style.backgroundRepeat =
                "no-repeat";

            });

            createHearts();

            setTimeout(()=>{

                changeScreen(
                    "updatingScreen",
                    "girlScreen"
                );

                typeWriter(
                    "girlText",
                    "Bienvenido mi amor ❤",
                    60
                );

                setTimeout(()=>{

                    changeScreen(
                        "girlScreen",
                        "menuScreen"
                    );

                    typeWriter(
                        "menuTitle",
                        "espacio de novio",
                        60
                    );

                },5000);

            },1000);

        }

    },80);

}

/* CORAZONES */

function createHearts(){

    for(let i=0;i<40;i++){

        const heart =
        document.createElement("div");

        heart.classList.add("heart");

        heart.innerHTML = "❤";

        heart.style.left =
        Math.random()*100 + "vw";

        heart.style.fontSize =
        (10 + Math.random()*20) + "px";

        heart.style.animationDuration =
        (5 + Math.random()*10) + "s";

        document.body.appendChild(heart);

    }

}

/* CAMBIAR PANTALLA */

function changeScreen(hide,show){

    document
    .getElementById(hide)
    .classList.add("hidden");

    document
    .getElementById(show)
    .classList.remove("hidden");

}

/* OCULTAR */

function hideAll(){

    document
    .getElementById("menuScreen")
    .classList.add("hidden");

    document
    .getElementById("analysisScreen")
    .classList.add("hidden");

    document
    .getElementById("statusScreen")
    .classList.add("hidden");

    document
    .getElementById("messageScreen")
    .classList.add("hidden");

}

/* ANALISIS */

function openAnalysis(){

    hideAll();

    document
    .getElementById("analysisScreen")
    .classList.remove("hidden");

    typeWriter(
        "analysisText",
`como me siento con Alex...

+ aumento de felicidad

+ sensación de calma

+ necesidad de quedarse un rato más

momento favorito del día:
hablar con vos ❤`,
35
    );

}

/* ESTADO */

function openStatus(){

    hideAll();

    document
    .getElementById("statusScreen")
    .classList.remove("hidden");

    typeWriter(
        "statusText",
`locamente enamorada de Alex

❤ ❤ ❤ ❤ ❤ ❤ ❤`,
40
    );

}

/* MENSAJE */

function openMessage(){

    hideAll();

    document
    .getElementById("messageScreen")
    .classList.remove("hidden");

    typeWriter(
        "messageText",
`feliz 3 meses

mi amor ❤`,
50
    );

}

/* VOLVER */

function backMenu(){

    hideAll();

    document
    .getElementById("menuScreen")
    .classList.remove("hidden");

}

</script>

</body>
  </html>
