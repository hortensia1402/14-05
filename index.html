<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Operativo Hortensia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    color:white;
    overflow:hidden;
    font-family:'Press Start 2P', cursive;
}

body::after{

    content:"";

    position:fixed;

    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );

    pointer-events:none;
}

.screen{

    width:100%;
    height:100vh;

    position:absolute;

    inset:0;

    display:flex;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    text-align:center;

    padding:30px;
}

.hidden{
    display:none;
}

.typing{

    white-space:pre-line;

    line-height:2;

    max-width:900px;

    text-shadow:
    0 0 10px white;

    font-size:1rem;
}

.big{

    white-space:pre-line;

    line-height:2;

    font-family:'Quicksand', sans-serif;

    font-size:1.1rem;
}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{

    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}

}

.input-box{

    margin-top:40px;

    display:flex;

    flex-direction:column;

    gap:20px;

    align-items:center;
}

input{

    width:320px;

    padding:15px;

    border:3px solid white;

    background:black;

    color:white;

    text-align:center;

    font-family:'Press Start 2P', cursive;

    outline:none;
}

button{

    padding:15px 30px;

    border:3px solid white;

    background:black;

    color:white;

    cursor:pointer;

    font-family:'Press Start 2P', cursive;

    transition:0.3s;
}

button:hover{

    background:white;
    color:black;
}

.error{

    margin-top:10px;

    font-size:0.7rem;
}

.progress-container{

    width:400px;

    height:30px;

    border:3px solid white;

    margin-top:40px;

    overflow:hidden;
}

.progress-bar{

    width:0%;

    height:100%;

    background:white;

    transition:0.3s;
}

.popup{

    position:absolute;

    width:280px;

    background:black;

    border:3px solid white;

    padding:30px;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    box-shadow:
    0 0 20px white;
}

.emotional{

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.overlay{

    position:absolute;

    inset:0;

    background:
    rgba(0,0,0,0.3);

    backdrop-filter:blur(2px);
}

.content{

    position:relative;

    z-index:2;

    background:rgba(255,182,193,0.15);

    border:3px solid rgba(255,255,255,0.4);

    padding:40px;

    border-radius:30px;

    backdrop-filter:blur(10px);

    width:90%;

    max-width:900px;
}

.cute-title{

    font-size:2rem;

    margin-bottom:50px;

    font-family:'Quicksand', sans-serif;
}

.cute-menu{

    display:flex;

    flex-direction:column;

    gap:30px;
}

.cute-item{

    font-size:1.5rem;

    font-family:'Quicksand', sans-serif;

    cursor:pointer;

    transition:0.3s;
}

.cute-item:hover{
    transform:scale(1.05);
}

.girl-gif{

    width:240px;

    border-radius:20px;

    margin-bottom:30px;
}

.heart{

    position:absolute;

    color:#ff69b4;

    animation:float 10s linear infinite;

    opacity:0.5;
}

@keyframes float{

    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-120vh);
    }

}

@media(max-width:768px){

    .typing{
        font-size:0.7rem;
    }

    .big{
        font-size:0.8rem;
    }

    .cute-title{
        font-size:1.5rem;
    }

    .cute-item{
        font-size:1.1rem;
    }

    .progress-container{
        width:90%;
    }

    input{
        width:90%;
        font-size:0.7rem;
    }

    .girl-gif{
        width:180px;
    }

}

</style>

</head>

<body>

<section class="screen" id="screen1">

    <div class="typing" id="introText"></div>

</section>

<section class="screen hidden" id="screen2">

    <div class="typing" id="identifyText"></div>

    <div class="input-box">

        <input
        type="text"
        id="nameInput"
        placeholder="NOMBRE">

        <button onclick="checkName()">
            CONTINUAR
        </button>

        <div class="error" id="nameError"></div>

    </div>

</section>

<section class="screen hidden" id="screen3">

    <div class="typing" id="confirmText"></div>

    <br><br>

    <button onclick="goQuestion1()">
        CONTINUAR
    </button>

</section>

<script>

function typeWriter(id,text,speed=40){

    const element =
    document.getElementById(id);

    element.innerHTML = "";

    let i = 0;

    function typing(){

        if(i < text.length){

            element.innerHTML =
            text.substring(0,i+1) +
            '<span class="cursor">█</span>';

            i++;

            setTimeout(typing,speed);

        }else{

            element.innerHTML = text;

        }

    }

    typing();

}

function changeScreen(hide,show){

    document
    .getElementById(hide)
    .classList.add("hidden");

    document
    .getElementById(show)
    .classList.remove("hidden");

}

window.onload = function(){

    typeWriter(
        "introText",
`hola

bienvenido al sistema operativo de Hortensia`,
70
    );

    setTimeout(()=>{

        changeScreen(
            "screen1",
            "screen2"
        );

        typeWriter(
            "identifyText",
            "por favor identificate.",
            50
        );

    },6000);

}

/* LOGIN */

function checkName(){

    const value =
    document
    .getElementById("nameInput")
    .value
    .toLowerCase()
    .trim();

    const names = [
        "alex",
        "alexin",
        "anto",
        "antorchita"
    ];

    if(names.includes(value)){

        changeScreen(
            "screen2",
            "screen3"
        );

        typeWriter(
            "confirmText",
            `para confirmar que eres ${value}, responde las siguientes preguntas.`,
            40
        );

    }else{

        document
        .getElementById("nameError")
        .innerHTML =
        "ERROR: usuario no identificado";

    }

}

function goQuestion1(){

    alert("ACÁ SIGUE EL RESTO DEL CÓDIGO");

}

</script>

</body>
</html>
