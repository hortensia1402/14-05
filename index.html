<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Operativo Hortensia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    color:white;
    overflow:hidden;
    font-family:'Press Start 2P', cursive;
}

body::after{
    content:"";
    position:fixed;
    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );

    pointer-events:none;
}

.screen{
    width:100%;
    height:100vh;

    position:absolute;
    inset:0;

    display:flex;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    text-align:center;

    padding:30px;
}

.hidden{
    display:none;
}

.typing{
    white-space:pre-line;
    line-height:2;
    max-width:900px;
    text-shadow:0 0 10px white;
    font-size:1rem;
}

.big{
    white-space:pre-line;
    line-height:2;
    font-family:'Quicksand', sans-serif;
    font-size:1.1rem;
}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{

    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}

}

.input-box{

    margin-top:40px;

    display:flex;
    flex-direction:column;

    gap:20px;

    align-items:center;
}

input{

    width:320px;

    padding:15px;

    border:3px solid white;

    background:black;

    color:white;

    text-align:center;

    font-family:'Press Start 2P', cursive;

    outline:none;
}

button{

    padding:15px 30px;

    border:3px solid white;

    background:black;

    color:white;

    cursor:pointer;

    font-family:'Press Start 2P', cursive;

    transition:0.3s;
}

button:hover{
    background:white;
    color:black;
}

.error{
    margin-top:10px;
    font-size:0.7rem;
}

.progress-container{

    width:400px;

    height:30px;

    border:3px solid white;

    margin-top:40px;

    overflow:hidden;
}

.progress-bar{

    width:0%;

    height:100%;

    background:white;

    transition:0.3s;
}

.popup{

    position:absolute;

    width:280px;

    background:black;

    border:3px solid white;

    padding:30px;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    box-shadow:0 0 20px white;
}

.emotional{

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.overlay{

    position:absolute;

    inset:0;

    background:rgba(0,0,0,0.3);

    backdrop-filter:blur(2px);
}

.content{

    position:relative;

    z-index:2;

    background:rgba(255,182,193,0.15);

    border:3px solid rgba(255,255,255,0.4);

    padding:40px;

    border-radius:30px;

    backdrop-filter:blur(10px);

    width:90%;

    max-width:900px;
}

.cute-title{

    font-size:2rem;

    margin-bottom:50px;

    font-family:'Quicksand', sans-serif;
}

.cute-menu{

    display:flex;

    flex-direction:column;

    gap:30px;
}

.cute-item{

    font-size:1.5rem;

    font-family:'Quicksand', sans-serif;

    cursor:pointer;

    transition:0.3s;
}

.cute-item:hover{
    transform:scale(1.05);
}

.girl-gif{

    width:240px;

    border-radius:20px;

    margin-bottom:30px;
}

.heart{

    position:absolute;

    color:#ff69b4;

    animation:float 10s linear infinite;

    opacity:0.5;
}

@keyframes float{

    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-120vh);
    }

}

@media(max-width:768px){

    .typing{
        font-size:0.7rem;
    }

    .big{
        font-size:0.8rem;
    }

    .cute-title{
        font-size:1.5rem;
    }

    .cute-item{
        font-size:1.1rem;
    }

    .progress-container{
        width:90%;
    }

    input{
        width:90%;
        font-size:0.7rem;
    }

    .girl-gif{
        width:180px;
    }

}

</style>

</head>

<body>

<section class="screen" id="screen1">
    <div class="typing" id="introText"></div>
</section>

<section class="screen hidden" id="screen2">

    <div class="typing" id="identifyText"></div>

    <div class="input-box">

        <input
        type="text"
        id="nameInput"
        placeholder="NOMBRE">

        <button onclick="checkName()">
            CONTINUAR
        </button>

        <div class="error" id="nameError"></div>

    </div>

</section>

<section class="screen hidden" id="screen3">

    <div class="typing" id="confirmText"></div>

    <br><br>

    <button onclick="goQuestion1()">
        CONTINUAR
    </button>

</section>

<section class="screen hidden" id="screen4">

    <div class="typing" id="question1"></div>

    <div class="input-box">

        <input type="text" id="answer1">

        <button onclick="checkAnswer1()">
            CONFIRMAR
        </button>

        <div class="error" id="error1"></div>

    </div>

</section>

<section class="screen hidden" id="screen5">

    <div class="typing" id="question2"></div>

    <div class="input-box">

        <input type="text" id="answer2">

        <button onclick="checkAnswer2()">
            CONFIRMAR
        </button>

        <div class="error" id="error2"></div>

    </div>

</section>

<section class="screen hidden" id="screen6">

    <div class="typing" id="question3"></div>

    <div class="input-box">

        <input type="text" id="answer3">

        <button onclick="checkAnswer3()">
            CONFIRMAR
        </button>

        <div class="error" id="error3"></div>

    </div>

</section>

<section class="screen hidden" id="loadingMenuScreen">

    <div class="typing" id="loadingMenuText"></div>

    <div class="progress-container">

        <div class="progress-bar" id="progressBar"></div>

    </div>

</section>

<section class="screen hidden" id="errorScreen"></section>

<section class="screen hidden" id="crisisScreen">

    <div class="typing" id="crisisText"></div>

    <br><br>

    <button onclick="updateSystem()">
        ACTUALIZAR
    </button>

</section>

<section class="screen hidden" id="updatingScreen">

    <div class="typing" id="updatingText"></div>

    <div class="progress-container">

        <div class="progress-bar" id="updateBar"></div>

    </div>

</section>

<section class="screen emotional hidden" id="girlScreen">

    <div class="overlay"></div>

    <div class="content">

        <img
        src="https://media.tenor.com/owSXAc8yVpAAAAAj/milk-and-mocha-kiss-cheek.gif"
        class="girl-gif">

        <div class="big" id="girlText"></div>

    </div>

</section>

<section class="screen emotional hidden" id="menuScreen">

    <div class="overlay"></div>

    <div class="content">

        <div class="cute-title" id="menuTitle">
            Espacio de novio
        </div>

        <div class="cute-menu">

            <div class="cute-item"
            onclick="openAnalysis()">

                Analisis de sentimientos

            </div>

            <div class="cute-item"
            onclick="openMessage()">

                Mensaje para hoy

            </div>

        </div>

    </div>

</section>

<script>

function typeWriter(id,text,speed=40){

    const element =
    document.getElementById(id);

    element.innerHTML = "";

    let i = 0;

    function typing(){

        if(i < text.length){

            element.innerHTML =
            text.substring(0,i+1) +
            '<span class="cursor">█</span>';

            i++;

            setTimeout(typing,speed);

        }else{

            element.innerHTML = text;

        }

    }

    typing();

}

function changeScreen(hide,show){

    document
    .getElementById(hide)
    .classList.add("hidden");

    document
    .getElementById(show)
    .classList.remove("hidden");

}

window.onload = function(){

    typeWriter(
        "introText",
`hola

bienvenido al sistema operativo de Hortensia`,
70
    );

    setTimeout(()=>{

        changeScreen(
            "screen1",
            "screen2"
        );

        typeWriter(
            "identifyText",
            "por favor identificate.",
            50
        );

    },6000);

}

/* LOGIN */

function checkName(){

    const value =
    document
    .getElementById("nameInput")
    .value
    .toLowerCase()
    .trim();

    const names = [
        "alex",
        "alexin",
        "anto",
        "antorchita"
    ];

    if(names.includes(value)){

        changeScreen(
            "screen2",
            "screen3"
        );

        typeWriter(
            "confirmText",
            `para confirmar que eres ${value}, responde las siguientes preguntas.`,
            40
        );

    }else{

        document
        .getElementById("nameError")
        .innerHTML =
        "ERROR: usuario no identificado";

    }

}

function goQuestion1(){

    changeScreen(
        "screen3",
        "screen4"
    );

    typeWriter(
        "question1",
        "¿Qué cosa en forma de osito adoptaste como mascota?",
        40
    );

}

function checkAnswer1(){

    const value =
    document
    .getElementById("answer1")
    .value
    .toLowerCase()
    .trim();

    if(
        value === "papa" ||
        value === "papá"
    ){

        changeScreen(
            "screen4",
            "screen5"
        );

        typeWriter(
            "question2",
            "¿Cómo se llama tu mascota?",
            40
        );

    }else{

        document
        .getElementById("error1")
        .innerHTML = "ERROR";

    }

}

function checkAnswer2(){

    const value =
    document
    .getElementById("answer2")
    .value
    .toLowerCase()
    .trim();

    if(value === "kimmy"){

        changeScreen(
            "screen5",
            "screen6"
        );

        typeWriter(
            "question3",
            "Quiero llenarte de leche los...",
            40
        );

    }else{

        document
        .getElementById("error2")
        .innerHTML = "ERROR";

    }

}

function checkAnswer3(){

    const value =
    document
    .getElementById("answer3")
    .value
    .toLowerCase()
    .trim();

    if(
        value === "fideos" ||
        value === "los fideos"
    ){

        enteringSequence();

    }else{

        document
        .getElementById("error3")
        .innerHTML = "ERROR";

    }

}

/* CARGA */

function enteringSequence(){

    changeScreen(
        "screen6",
        "loadingMenuScreen"
    );

    typeWriter(
        "loadingMenuText",
        "Iniciando sesión...",
        50
    );

    const bar =
    document.getElementById("progressBar");

    let width = 0;

    const interval = setInterval(()=>{

        width += 2;

        bar.style.width =
        width + "%";

        if(width >= 100){

            clearInterval(interval);

            setTimeout(()=>{
                startErrors();
            },1000);

        }

    },80);

}

/* ERRORES */

let errors = 0;

function startErrors(){

    changeScreen(
        "loadingMenuScreen",
        "errorScreen"
    );

    spawnError();

}

function spawnError(){

    const popup =
    document.createElement("div");

    popup.classList.add("popup");

    popup.innerHTML = `
    <div style="margin-bottom:20px;">
        ERROR DEL SISTEMA
    </div>

    <button onclick="closeError(this)">
        OK
    </button>
    `;

    document
    .getElementById("errorScreen")
    .appendChild(popup);

}

function closeError(button){

    button.parentElement.remove();

    errors++;

    if(errors < 7){

        spawnError();

    }else{

        setTimeout(()=>{

            changeScreen(
                "errorScreen",
                "crisisScreen"
            );

            typeWriter(
                "crisisText",
`⚠️ inicio de sesión de Alex detectado

La interfaz debe actualizarse`,
50
            );

        },500);

    }

}

/* UPDATE */

function updateSystem(){

    changeScreen(
        "crisisScreen",
        "updatingScreen"
    );

    typeWriter(
        "updatingText",
        "actualizando sistema...",
        50
    );

    const bar =
    document.getElementById("updateBar");

    let width = 0;

    const interval = setInterval(()=>{

        width += 2;

        bar.style.width = width + "%";

        if(width >= 100){

            clearInterval(interval);

            /* FONDO */

            const fondo =
            "https://media1.tenor.com/m/F5sQ-3KwDIMAAAAC/powerpuff-girls-aesthetic-hearts.gif";

            document.body.style.backgroundImage =
            `url('${fondo}')`;

            document.body.style.backgroundSize =
            "cover";

            document.body.style.backgroundPosition =
            "center";

            document.querySelectorAll(".emotional")
            .forEach(screen=>{

                screen.style.backgroundImage =
                `url('${fondo}')`;

            });

            setTimeout(()=>{

                changeScreen(
                    "updatingScreen",
                    "girlScreen"
                );

                typeWriter(
                    "girlText",
                    "Bienvenido Alexin de mi amor*-*",
                    60
                );

                setTimeout(()=>{

                    changeScreen(
                        "girlScreen",
                        "menuScreen"
                    );

                    createHearts();

                },5000);

            },1000);

        }

    },80);

}

/* CORAZONES */

function createHearts(){

    for(let i=0;i<35;i++){

        const heart =
        document.createElement("div");

        heart.classList.add("heart");

        heart.innerHTML = "❤";

        heart.style.left =
        Math.random()*100 + "vw";

        heart.style.fontSize =
        (10 + Math.random()*25) + "px";

        heart.style.animationDuration =
        (5 + Math.random()*10) + "s";

        document.body.appendChild(heart);

    }

}

function openAnalysis(){

    alert("ANÁLISIS");

}

function openMessage(){

    alert("MENSAJES");

}

</script>

</body>
    </html>
